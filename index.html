<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#D97706">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="わさび食堂">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23D97706'/><path d='M7 17 Q7 25 16 25 Q25 25 25 17 Z' fill='white'/><rect x='11' y='25' width='10' height='2.5' rx='1.2' fill='white'/><path d='M12 13 Q13.5 10 12 7' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' opacity='.85'/><path d='M16 12 Q17.5 9 16 6' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' opacity='.85'/><path d='M20 13 Q21.5 10 20 7' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' opacity='.85'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23D97706'/><path d='M36 96 Q36 142 90 142 Q144 142 144 96 Z' fill='white'/><rect x='62' y='142' width='56' height='14' rx='7' fill='white'/><path d='M68 72 Q76 56 68 40' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' opacity='.85'/><path d='M90 66 Q98 50 90 34' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' opacity='.85'/><path d='M112 72 Q120 56 112 40' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' opacity='.85'/></svg>">
<title>わさび食堂 売上管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#D97706;--g2:#B45309;--g3:#F59E0B;--g4:#FDE68A;--g5:#FFFBEB;
  --amber:#92400E;--amber-bg:#FEF3C7;
  --bg:#FEFDF5;--white:#FFFFFF;--card:#FFFFFF;
  --text:#1C1410;--text2:#44332A;--text3:#92816A;
  --border:#EDE8D8;--border2:#D4C89A;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
@media(min-width:640px){
  .app{max-width:none;margin:0}
  .hdr{position:fixed;top:0;left:0;right:0;z-index:200;padding:10px 32px}
  .nav{
    position:fixed !important;top:64px !important;left:0 !important;right:0 !important;
    bottom:auto !important;width:100% !important;max-width:none !important;
    transform:none !important;height:46px !important;
    flex-direction:row !important;justify-content:center !important;
    align-items:stretch !important;border-top:none !important;
    border-bottom:1px solid var(--border) !important;
    background:var(--white) !important;padding:0 32px !important;gap:0 !important;z-index:190
  }
  .nav-btn{flex:none !important;flex-direction:row !important;gap:6px !important;
    padding:0 20px !important;height:46px !important;border-radius:0 !important;
    border-bottom:3px solid transparent !important;width:auto !important;margin:0 !important}
  .nav-btn.on{background:none !important;border-bottom-color:var(--g2) !important}
  .nav-btn.on .nav-lbl{color:var(--g2) !important;font-weight:600}
  .nav-icon{font-size:15px !important}
  .nav-lbl{font-size:12px !important;color:var(--text2)}
  .content{
    margin-left:auto !important;margin-right:auto !important;
    margin-top:124px !important;
    width:100% !important;max-width:860px !important;
    padding:0 32px 60px !important;
    min-height:auto;box-sizing:border-box
  }
  .total-bar{left:0 !important;transform:none !important;width:100% !important;
    max-width:none !important;bottom:0 !important;position:fixed}
  .card{margin:10px 0}
  .cat-row{padding:0 0 6px;margin:0}
  .prod-list{display:grid;grid-template-columns:1fr 1fr;margin:0}
  .prod-item{border-right:1px solid var(--border)}
  .prod-item:nth-child(even){border-right:none}
  .filter-bar{padding:10px 0 4px}
  .rec-card,.yr-card,.yr-cmp-card{margin:6px 0}
  .cmp-tabs{margin:10px 0 0}
  .save-btn{width:100%;margin:10px 0 0}
  .import-confirm-btn{width:100%;margin:10px 0}
  .sync-banner{margin:10px 0 0}
  .an-wrap{padding:0}
  .toast{top:124px}
  .yr-table{font-size:13px}
}
/* ヘッダー */
.hdr{background:var(--g1);padding:14px 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hdr-left .hdr-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:.06em}
.hdr-left .hdr-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.sync-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:7px 12px;cursor:pointer;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;font-family:inherit}
.sync-btn:disabled{opacity:.5;cursor:default}
.sync-btn.syncing{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-status{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px;text-align:right;min-height:13px}
/* コンテンツ */
.content{flex:1;padding-bottom:80px}
/* ナビ */
.nav{display:flex;background:var(--white);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 14px;border:none;background:none;cursor:pointer;font-family:inherit}
.nav-icon{font-size:18px}
.nav-lbl{font-size:10px;color:var(--text3)}
.nav-btn.on .nav-lbl{color:var(--g1);font-weight:600}
/* カード */
.card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);margin:10px 12px;padding:15px}
.card-lbl{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:11px;font-weight:600}
.field{margin-bottom:11px}
.field:last-child{margin-bottom:0}
.field-lbl{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
input[type=date],input[type=text],input[type=number],select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--white);color:var(--text);outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--g2);box-shadow:0 0 0 3px rgba(180,83,9,.15)}
/* 場所トグル */
.loc-wrap{display:flex;background:var(--bg);border-radius:var(--radius);padding:3px;gap:3px}
.loc-btn{flex:1;border:none;cursor:pointer;padding:9px 4px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;background:none;color:var(--text3);transition:all .15s}
.loc-btn.on{background:var(--g1);color:#fff;box-shadow:0 2px 8px rgba(180,83,9,.25)}
/* カテゴリタブ */
.cat-row{display:flex;gap:8px;padding:0 12px 6px}
.cat-btn{flex:1;border:none;cursor:pointer;padding:9px 4px;border-radius:var(--radius);font-size:12px;font-weight:600;font-family:inherit;background:var(--white);color:var(--text3);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:2px}
.cat-btn.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.cat-cnt{font-size:10px;opacity:.75}
/* 商品リスト */
.prod-list{margin:0 12px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
.prod-item{display:flex;align-items:center;padding:10px 12px;background:var(--white);gap:8px;border-bottom:1px solid var(--border)}
.prod-item:last-child{border-bottom:none}
.prod-item.sel{background:var(--g5)}
.prod-info{flex:1;min-width:100px}
.prod-name{font-size:13px;font-weight:600;line-height:1.4}
.prod-price{font-size:11px;color:var(--text3);margin-top:2px}
.prod-price.vp{color:var(--g2);font-weight:600}
.qty-wrap{display:flex;align-items:center;flex-shrink:0}
.q-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);line-height:1;font-family:inherit}
.q-btn.add{border-color:var(--g3);color:var(--g2)}
.q-num{width:34px !important;padding:0 !important;text-align:center;border:none;font-size:15px;font-weight:700;background:transparent;color:var(--text);font-family:inherit;outline:none}
.price-row{display:flex;align-items:center;gap:4px;margin-top:5px}
.price-in{width:72px;padding:4px 8px;border:1px solid var(--g3);border-radius:6px;font-size:12px;font-family:inherit;color:var(--text);background:var(--white);outline:none}
/* 合計バー */
.total-bar{background:var(--g2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:99}
.t-breakdown{display:flex;gap:10px}
.t-bit{font-size:11px;color:rgba(255,255,255,.75)}
.t-total{font-size:21px;font-weight:700;color:#fff}
/* 保存ボタン */
.save-btn{width:calc(100% - 24px);margin:10px 12px 0;padding:15px;background:var(--g2);color:#fff;border:none;border-radius:var(--radius-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(180,83,9,.3)}
.save-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
/* トースト */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--g2);color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeup .3s ease}
.toast.err{background:#DC2626}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* 履歴 */
.filter-bar{display:flex;gap:6px;padding:10px 12px 4px;align-items:center;flex-wrap:wrap}
.f-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit}
.f-btn.on{border-color:var(--g2);background:var(--g5);color:var(--g1);font-weight:600}
.csv-btn{margin-left:auto;padding:6px 12px;border-radius:20px;border:1px solid var(--g3);background:var(--white);font-size:12px;cursor:pointer;color:var(--g1);font-family:inherit;font-weight:500}
.rec-card{background:var(--white);border-radius:var(--radius-lg);margin:6px 12px;overflow:hidden;border:1px solid var(--border)}
.rec-hdr{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.rec-date{font-size:14px;font-weight:600}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-ok{background:var(--g5);color:var(--g1)}
.tag-ev{background:#FEF3C7;color:#92400E}
.tag-gw{background:#FEE2E2;color:#991B1B}
.rec-total{margin-left:auto;font-size:15px;font-weight:700;color:var(--g1)}
.rec-body{padding:0 14px 13px;border-top:1px solid var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:11px 0 7px}
.det-cell{text-align:center}
.det-lbl{font-size:10px;color:var(--text3)}
.det-val{font-size:13px;font-weight:700;margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:4px;padding:5px 0}
.chip{font-size:11px;padding:3px 9px;background:var(--bg);border-radius:20px;color:var(--text2)}
.act-row{display:flex;gap:8px;padding-top:9px}
.act-btn{flex:1;padding:9px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit}
.act-btn.del{color:#DC2626;border-color:#FECACA}
.empty{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-ico{font-size:44px;margin-bottom:12px}
/* 集計 */
.an-wrap{padding:0 12px}
.an-ttl{font-size:13px;font-weight:600;color:var(--text2);padding:16px 0 8px}
.an-big{background:var(--g2);border-radius:var(--radius-lg);padding:20px;text-align:center;color:#fff}
.an-big-lbl{font-size:11px;opacity:.7;letter-spacing:.1em}
.an-big-val{font-size:28px;font-weight:700;margin-top:5px}
.an-big-sub{font-size:11px;opacity:.6;margin-top:5px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px}
.stat-lbl{font-size:11px;color:var(--text3)}
.stat-val{font-size:19px;font-weight:700;color:var(--g1);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.m-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
.m-label{font-size:12px;font-weight:600;min-width:52px}
.m-bar-bg{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.m-bar{height:100%;background:var(--g3);border-radius:4px}
.m-val{font-size:12px;font-weight:600;min-width:74px;text-align:right}
.rank-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.rank-n{font-size:14px;font-weight:700;color:var(--g3);min-width:24px;text-align:center}
.rank-info{flex:1}
.rank-name{font-size:13px;font-weight:600}
.rank-bar-bg{margin-top:4px;height:4px;background:var(--bg);border-radius:4px;overflow:hidden}
.rank-bar{height:100%;background:var(--g4);border-radius:4px}
.rank-right{text-align:right;min-width:52px}
.rank-qty{font-size:13px;font-weight:700;color:var(--g1)}
.rank-days{font-size:10px;color:var(--text3)}
/* 比較 */
.cmp-tabs{display:flex;background:var(--bg);border-radius:var(--radius);padding:3px;gap:3px;margin:10px 12px 0}
.cmp-tab{flex:1;border:none;cursor:pointer;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:600;font-family:inherit;background:none;color:var(--text3)}
.cmp-tab.on{background:var(--g2);color:#fff}
.yr-card{background:var(--white);border-radius:var(--radius-lg);margin:8px 12px;border:1px solid var(--border);overflow:hidden}
.yr-card-hdr{background:var(--g5);border-bottom:1px solid var(--g4);padding:10px 14px}
.yr-card-name{font-size:13px;font-weight:700;color:var(--g1)}
.yr-card-sub{font-size:10px;color:var(--g2);margin-top:2px}
.yr-tbl{width:100%;border-collapse:collapse;font-size:12px}
.yr-tbl th{padding:7px 10px;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);font-weight:600;background:var(--bg)}
.yr-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.yr-tbl tr:last-child td{border-bottom:none}
.yr-tbl .tc{font-weight:700;color:var(--g1)}
/* 取込 */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px;background:var(--white)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--g2);background:var(--g5)}
.drop-zone.loaded{border-color:var(--g2);border-style:solid;background:var(--g5)}
.drop-zone-icon{font-size:28px;margin-bottom:6px}
.drop-zone-title{font-size:13px;font-weight:600;color:var(--text2)}
.drop-zone-sub{font-size:11px;color:var(--text3);margin-top:3px}
.drop-zone.loaded .drop-zone-title{color:var(--g1)}
.import-step{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:12px;color:var(--text3)}
.import-step-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.import-step-num.active{background:var(--g2);color:#fff}
.import-step-num.done{background:var(--g1);color:#fff}
.preview-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px}
.preview-row.new-rec{background:#F0FBF5}
.preview-row.dup-rec{background:var(--bg);opacity:.6}
.preview-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-new{background:#C8F0DC;color:#0A5C3A}
.badge-dup{background:var(--border);color:var(--text3)}
.import-parse-btn{width:100%;padding:13px;background:var(--g2);color:#fff;border:none;border-radius:var(--radius-lg);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.import-parse-btn:disabled{opacity:.4;cursor:default}
.import-confirm-btn{width:calc(100% - 24px);margin:10px 12px;padding:14px;background:var(--g1);color:#fff;border:none;border-radius:var(--radius-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(180,83,9,.25)}
.import-confirm-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
/* 同期バナー */
.sync-banner{margin:10px 12px 0;background:var(--g5);border:1px solid var(--g3);border-radius:var(--radius-lg);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sync-banner-text{font-size:12px;color:var(--g1);font-weight:500}
.sync-banner-btn{background:var(--g2);color:#fff;border:none;border-radius:var(--radius);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">わさび食堂 売上管理</div>
      <div class="hdr-sub">Sales Management System</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
      <button class="sync-btn" id="sync-btn" onclick="syncAll()">
        <span id="sync-icon">☁️</span> スプレッドシートへ同期
      </button>
      <div class="sync-status" id="sync-status"></div>
    </div>
  </div>

  <div class="content" id="content"></div>

  <div id="total-bar" style="display:none" class="total-bar">
    <div id="breakdown" class="t-breakdown"></div>
    <div id="total-disp" class="t-total"></div>
  </div>

  <div class="nav">
    <button class="nav-btn on" id="nav-input" onclick="sv('input')">
      <span class="nav-icon">✏️</span><span class="nav-lbl">入力</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="sv('history')">
      <span class="nav-icon">📋</span><span class="nav-lbl">履歴</span>
    </button>
    <button class="nav-btn" id="nav-analytics" onclick="sv('analytics')">
      <span class="nav-icon">📊</span><span class="nav-lbl">集計</span>
    </button>
    <button class="nav-btn" id="nav-compare" onclick="sv('compare')">
      <span class="nav-icon">📅</span><span class="nav-lbl">年比較</span>
    </button>
    <button class="nav-btn" id="nav-import" onclick="sv('import')">
      <span class="nav-icon">📥</span><span class="nav-lbl">取込</span>
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  設定
// ══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyWGZqabQdPqQpwRJbCU4oejikCkHTNVG2nDSdO11ZQRZQMaxXP-YYwS2GbJW-Yxjgy7w/exec';
const STORAGE_KEY = 'wasabi_v3';

// ══════════════════════════════════════════
//  商品マスタ
// ══════════════════════════════════════════
const PRODS = {
  フード: [
    {id:'wasabi_don',  name:'わさび丼',             price:900},
    {id:'mini_don',    name:'ミニわさび丼',           price:700},
    {id:'pork_don',    name:'わさびポーク丼',          price:1100},
    {id:'inari',       name:'わさびいなり',            price:500},
    {id:'onigiri',     name:'わさびおにぎり',           price:500},
    {id:'sausage_dog', name:'わさびソーセージドッグ',    price:1200},
    {id:'sausage',     name:'わさびソーセージ',         price:1000},
    {id:'roast',       name:'おつまみロース',           price:1000},
  ],
  ドリンク: [
    {id:'wasabi_coffee', name:'わさびコーヒー',         price:750},
    {id:'orig_blend',    name:'オリジナルブレンド',      price:550},
    {id:'decaf',         name:'Decaf(Coffee Supreme)',  price:550},
    {id:'passage',       name:'Passage Coffee',         price:650},
    {id:'peach_soda',    name:'わさびピーチソーダ',      price:600},

function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(n){ return '¥' + Math.round(n).toLocaleString(); }
function fmtD(s){ return s.replace(/-/g,'/'); }
function getPeriod(d){
  const m = new Date(d).getMonth()+1, day = new Date(d).getDate();
  if((m===4&&day>=29)||(m===5&&day<=5)) return 'GW';
  if(m===9&&day>=19&&day<=25) return 'シルバーWK';
  if(m===8&&day>=11&&day<=16) return 'お盆';
  return '通常';
}
function getWI(w){
  if(!w) return '';
  if(w.includes('雨')) return '🌧';
  if(w.includes('晴')) return '☀️';
  if(w.includes('くもり')||w.includes('曇')) return '☁️';
  return '';
}

function loadFromStorage(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) return JSON.parse(saved);
  }catch(e){}
  return null;
}
function saveToStorage(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }catch(e){}
}

function init(){
  // まずローカルデータで即表示（画面を素早く出す）
  const saved = loadFromStorage();
  if(saved && saved.length > 0){
    records = saved;
  } else {
    const ids = new Set();
    records = [...HIST, ...NOTION].filter(r => {
      if(ids.has(r.id)) return false;
      ids.add(r.id); return true;
    });
    saveToStorage();
  }
  render();
  // バックグラウンドでスプレッドシートから最新データを取得
  syncFromSheets();
}

async function syncFromSheets(){
  const status = document.getElementById('sync-status');
  try{
    if(status) status.textContent = '最新データを取得中...';
    const res = await fetch(GAS_URL + '?action=getData', {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
    if(!res.ok){ if(status) status.textContent = ''; return; }
    const data = await res.json();
    if(!data.success || !data.records || data.records.length === 0){
      if(status) status.textContent = '';
      return;
    }

    // 日付を YYYY-MM-DD 形式に正規化
    const normalize = (r) => {
      let d = r.date || '';
      // Date文字列（Thu Nov 18 2021...）の場合
      if(d.length > 10){
        const parsed = new Date(d);
        if(!isNaN(parsed)){
          const y = parsed.getFullYear();
          const m = String(parsed.getMonth()+1).padStart(2,'0');
          const day = String(parsed.getDate()).padStart(2,'0');
          d = `${y}-${m}-${day}`;
        }
      }
      return {...r, date: d.substring(0,10)};
    };

    const ssRecords = data.records.map(normalize);

    // date + event で重複排除キーを作成
    const ssKeys = new Set(ssRecords.map(r => r.date + '_' + (r.event||'')));

    // ローカルにしかないデータ（手動入力で未同期のもの）を保持
    const localOnly = records.filter(r =>
      !ssKeys.has(r.date + '_' + (r.event||''))
    );

    // マージして日付でソート
    const merged = [...ssRecords, ...localOnly]
      .sort((a,b) => b.date.localeCompare(a.date));

    records = merged;
    saveToStorage();
    render();

    if(status){
      status.textContent = `✅ ${ssRecords.length}件を同期しました`;
      setTimeout(()=>{ status.textContent=''; }, 3000);
    }
  }catch(e){
    if(status) status.textContent = '';
  }
}

// ══════════════════════════════════════════
//  スプレッドシート同期
// ══════════════════════════════════════════
async function syncToSheets(recs){
  const btn = document.getElementById('sync-btn');
  const icon = document.getElementById('sync-icon');
  const status = document.getElementById('sync-status');
  btn.disabled = true; btn.classList.add('syncing');
  icon.textContent = '⏳'; status.textContent = `${recs.length}件を送信中...`;
  try {
    await fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(recs.filter(r => r.total > 0))
    });
    icon.textContent = '✅';
    status.textContent = `${recs.length}件を送信しました`;
    showToast(`✅ スプレッドシートに${recs.length}件を同期しました`);
  } catch(e) {
    icon.textContent = '☁️';
    status.textContent = '同期に失敗しました';
    showToast('⚠️ 同期に失敗しました', 'err');
  }
  btn.disabled = false; btn.classList.remove('syncing');
  setTimeout(() => { icon.textContent = '☁️'; status.textContent = ''; }, 5000);
}
async function syncAll(){ await syncToSheets(records); }

function calcTotals(){
  let food=0, drink=0, merch=0;
  Object.entries(form.items).forEach(([id, item]) => {
    if(!item.qty && !item.amount) return;
    const p = ALL.find(x => x.id === id); if(!p) return;
    let sub = 0;
    if(p.price === null){
      // 生わさびは売上合計金額を直接使用
      sub = item.amount || 0;
    } else {
      sub = (p.price * (item.qty||0));
    }
    if(FOOD_IDS.has(id)) food += sub;
    else if(DRINK_IDS.has(id)) drink += sub;
    else merch += sub;
  });
  return {food, drink, merch, total: food+drink+merch};
}

  const weatherEl = document.querySelector('.weather-select');
  const memoEl    = document.querySelector('.memo-input');
  if(dateEl    && dateEl.value)    form.date    = dateEl.value;
  if(eventEl)                      form.event   = eventEl.value;
  if(weatherEl)                    form.weather = weatherEl.value;
  if(memoEl)                       form.memo    = memoEl.value;
}

  if(editId) records = records.map(r => r.id===editId ? rec : r);

function exportCSV(){
  const h = ['日付','場所','イベント名','天気','合計','フード','ドリンク','物販','メモ', ...ALL.map(p=>p.name)];
  const rows = records.filter(r=>r.total>0).map(r => [
    r.date, r.loc, r.event||'', r.weather||'', r.total,
    r.foodTotal||'', r.drinkTotal||'', r.merchTotal||'', r.memo||'',
    ...ALL.map(p => { const it=r.items?.[p.id]; if(!it) return 0; return typeof it==='object'?it.qty:it; })
  ]);
  const csv = [h, ...rows].map(row => row.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `わさび食堂_売上_${today()}.csv`; a.click();
}

    ${tabs.map(t=>`<button onclick="setAnalyticsMode('${t}')" style="flex:1;border:none;cursor:pointer;padding:8px 4px;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;background:${analyticsMode===t?'var(--g2)':'none'};color:${analyticsMode===t?'#fff':'var(--text3)'}">${t}</button>`).join('')}
  </div>
  <div id="analytics-body"></div>`;

  renderAnalyticsBody(active);
}

function setAnalyticsMode(m){ analyticsMode=m; renderAnalytics(); }

function renderAnalyticsBody(active){
  const body = document.getElementById('analytics-body'); if(!body) return;
  if(analyticsMode==='概要') body.innerHTML = renderAnalyticsSummary(active);
  else if(analyticsMode==='天気・季節') body.innerHTML = renderWeatherSeasonal(active);
  else body.innerHTML = renderPreparationGuide(active);
}

function renderAnalyticsSummary(active){
  const grand = active.reduce((s,r) => s+r.total, 0);
  const ok = active.filter(r => r.loc==='奥多摩駅前');
  const ev = active.filter(r => r.loc==='イベント');
  const byMonth = {};
  active.forEach(r => {
    const m = r.date.substring(0,7);
    if(!byMonth[m]) byMonth[m] = {total:0, count:0};
    byMonth[m].total += r.total; byMonth[m].count++;
  });
  const months = Object.entries(byMonth).sort(([a],[b]) => a.localeCompare(b));
  const maxM = Math.max(...months.map(([,d]) => d.total), 1);
  const ptot = {};
  active.forEach(r => {
    Object.entries(r.items||{}).forEach(([id, val]) => {
      const qty = typeof val==='object' ? val.qty : val; if(!qty) return;
      const p = ALL.find(x => x.id===id); if(!p) return;
      if(!ptot[id]) ptot[id] = {name:p.name, qty:0, days:0};
      ptot[id].qty += qty; ptot[id].days++;
    });
  });
  const tops = Object.values(ptot).sort((a,b) => b.qty-a.qty).slice(0,10);
  const maxQ = tops.length > 0 ? tops[0].qty : 1;
  const yr = [...new Set(active.map(r => r.date.substring(0,4)))].sort();
  return `<div class="an-wrap">
    <div class="an-ttl">累計売上</div>
    <div class="an-big">
      <div class="an-big-lbl">TOTAL SALES</div>
      <div class="an-big-val">${fmt(grand)}</div>
      <div class="an-big-sub">${yr[0]}〜${yr[yr.length-1]}年 · 全${active.length}日間</div>
    </div>
    <div class="an-ttl">出店場所別</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">🏔 奥多摩駅前</div><div class="stat-val">${fmt(ok.reduce((s,r)=>s+r.total,0))}</div><div class="stat-sub">${ok.length}日 · 平均${fmt(Math.round(ok.reduce((s,r)=>s+r.total,0)/(ok.length||1)))}</div></div>
      <div class="stat-card"><div class="stat-lbl">🎪 イベント</div><div class="stat-val">${fmt(ev.reduce((s,r)=>s+r.total,0))}</div><div class="stat-sub">${ev.length}件 · 平均${fmt(Math.round(ev.reduce((s,r)=>s+r.total,0)/(ev.length||1)))}</div></div>
    </div>
    <div class="an-ttl">月別売上</div>
    <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:2px 14px">
      ${months.map(([m,d]) => `<div class="m-row">
        <div class="m-label">${m.replace('-','/')}</div>
        <div class="m-bar-bg"><div class="m-bar" style="width:${Math.round(d.total/maxM*100)}%"></div></div>
        <div class="m-val">${fmt(d.total)}</div>
      </div>`).join('')}
    </div>
    ${tops.length>0 ? `<div class="an-ttl">商品別 販売数ランキング</div>
    <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:2px 14px">
      ${tops.map((p,i) => `<div class="rank-row">
        <div class="rank-n">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}</div>
          <div class="rank-bar-bg"><div class="rank-bar" style="width:${Math.round(p.qty/maxQ*100)}%"></div></div>
        </div>
        <div class="rank-right"><div class="rank-qty">${p.qty}個</div><div class="rank-days">${p.days}日</div></div>
      </div>`).join('')}
    </div>` : ''}
    <div style="height:20px"></div>
  </div>`;
}

function normalizeWeather(w){
  if(!w) return null;
  if(w.includes('晴')&&!w.includes('雨')&&!w.includes('くもり')) return '晴れ';
  if(w.includes('雨')) return '雨・くもり/雨';
  if(w.includes('くもり')||w.includes('曇')) return 'くもり';
  return null;
}

function renderWeatherSeasonal(active){
  // 天気別分析（奥多摩のみ、天気データあり）
  const withWeather = active.filter(r => r.weather && normalizeWeather(r.weather));
  const ok_w = withWeather.filter(r => r.loc==='奥多摩駅前');
  const ev_w = withWeather.filter(r => r.loc==='イベント');

  const weatherGroups = {};
  const weatherOrder = ['晴れ','くもり','雨・くもり/雨'];
  ok_w.forEach(r => {
    const w = normalizeWeather(r.weather);
    if(!weatherGroups[w]) weatherGroups[w] = [];
    weatherGroups[w].push(r.total);
  });
  const evWeatherGroups = {};
  ev_w.forEach(r => {
    const w = normalizeWeather(r.weather);
    if(!evWeatherGroups[w]) evWeatherGroups[w] = [];
    evWeatherGroups[w].push(r.total);
  });

  // 月別平均（全データ）
  const byMonthNum = {};
  active.forEach(r => {
    const m = parseInt(r.date.substring(5,7));
    if(!byMonthNum[m]) byMonthNum[m] = [];
    byMonthNum[m].push(r.total);
  });
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthAvgs = Array.from({length:12},(_,i)=>i+1).map(m => ({
    m, name:monthNames[m-1],
    avg: byMonthNum[m] ? Math.round(byMonthNum[m].reduce((a,b)=>a+b,0)/byMonthNum[m].length) : null,
    count: byMonthNum[m]?.length || 0
  })).filter(d => d.avg !== null);
  const maxAvg = Math.max(...monthAvgs.map(d=>d.avg),1);

  // 季節判定
  const seasonAvg = {春:[], 夏:[], 秋:[], 冬:[]};
  active.forEach(r => {
    const m = parseInt(r.date.substring(5,7));
    if([3,4,5].includes(m)) seasonAvg.春.push(r.total);
    else if([6,7,8].includes(m)) seasonAvg.夏.push(r.total);
    else if([9,10,11].includes(m)) seasonAvg.秋.push(r.total);
    else seasonAvg.冬.push(r.total);
  });

  const wIcons = {'晴れ':'☀️','くもり':'☁️','雨・くもり/雨':'🌧'};

  return `<div class="an-wrap">
    <div class="an-ttl">☀️ 天気別 平均売上（奥多摩駅前）</div>
    ${ok_w.length === 0 ? `<div style="font-size:12px;color:var(--text3);padding:8px 0">天気データのある記録が少ないため表示できません</div>` :
    `<div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--bg)">
          <th style="padding:10px 14px;text-align:left;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">天気</th>
          <th style="padding:10px 14px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">平均売上</th>
          <th style="padding:10px 14px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">日数</th>
          <th style="padding:10px 14px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">最高</th>
        </tr></thead>
        <tbody>
          ${weatherOrder.filter(w=>weatherGroups[w]).map(w => {
            const vals = weatherGroups[w];
            const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
            const max = Math.max(...vals);
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 14px;font-weight:600">${wIcons[w]||''} ${w}</td>
              <td style="padding:10px 14px;text-align:center;font-weight:700;color:var(--g2)">${fmt(avg)}</td>
              <td style="padding:10px 14px;text-align:center;color:var(--text3)">${vals.length}日</td>
              <td style="padding:10px 14px;text-align:center;color:var(--text3)">${fmt(max)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`}
    ${ev_w.length>0 ? `<div class="an-ttl">🎪 天気別 平均売上（イベント）</div>
    <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--bg)">
          <th style="padding:10px 14px;text-align:left;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">天気</th>
          <th style="padding:10px 14px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">平均売上</th>
          <th style="padding:10px 14px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">日数</th>
        </tr></thead>
        <tbody>
          ${weatherOrder.filter(w=>evWeatherGroups[w]).map(w => {
            const vals = evWeatherGroups[w];
            const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 14px;font-weight:600">${wIcons[w]||''} ${w}</td>
              <td style="padding:10px 14px;text-align:center;font-weight:700;color:var(--g2)">${fmt(avg)}</td>
              <td style="padding:10px 14px;text-align:center;color:var(--text3)">${vals.length}日</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <div class="an-ttl">📅 月別 平均売上</div>
    <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:2px 14px">
      ${monthAvgs.map(d => `<div class="m-row">
        <div class="m-label" style="min-width:40px">${d.name}</div>
        <div class="m-bar-bg"><div class="m-bar" style="width:${Math.round(d.avg/maxAvg*100)}%"></div></div>
        <div style="font-size:12px;font-weight:600;min-width:80px;text-align:right">${fmt(d.avg)}</div>
        <div style="font-size:10px;color:var(--text3);min-width:30px;text-align:right">${d.count}日</div>
      </div>`).join('')}
    </div>

    <div class="an-ttl">🌸 季節別 平均売上</div>
    <div class="stat-grid">
      ${Object.entries(seasonAvg).map(([s,vals]) => {
        if(!vals.length) return '';
        const icons = {春:'🌸',夏:'☀️',秋:'🍂',冬:'❄️'};
        const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
        return `<div class="stat-card">
          <div class="stat-lbl">${icons[s]||''} ${s}</div>
          <div class="stat-val">${fmt(avg)}</div>
          <div class="stat-sub">${vals.length}日間</div>
        </div>`;
      }).join('')}
    </div>
    <div style="height:20px"></div>
  </div>`;
}

function renderPreparationGuide(active){
  // 商品データあり記録（2025-11以降）
  const withItems = active.filter(r => Object.keys(r.items||{}).length > 0);
  const ok = withItems.filter(r => r.loc==='奥多摩駅前');
  const ev = withItems.filter(r => r.loc==='イベント');

  const calcItemAvg = (recs) => {
    const totals = {};
    recs.forEach(r => {
      Object.entries(r.items||{}).forEach(([id,val]) => {
        const qty = typeof val==='object'?val.qty:val; if(!qty) return;
        const p = ALL.find(x=>x.id===id); if(!p) return;
        if(!totals[id]) totals[id]={name:p.name,total:0,days:0,max:0};
        totals[id].total+=qty; totals[id].days++; totals[id].max=Math.max(totals[id].max,qty);
      });
    });
    return Object.values(totals)
      .map(d=>({...d, avg:Math.round(d.total/d.days*10)/10}))
      .filter(d=>d.avg>=1)
      .sort((a,b)=>b.avg-a.avg);
  };

  const okAvgs = calcItemAvg(ok);
  const evAvgs = calcItemAvg(ev);

  // 天気別の比較（奥多摩）
  const okSunny = ok.filter(r=>r.weather&&r.weather.includes('晴'));
  const okRainy = ok.filter(r=>r.weather&&r.weather.includes('雨'));

  const renderItemTable = (avgs, recs, label) => {
    if(!avgs.length) return `<div style="font-size:12px;color:var(--text3);padding:8px 0">データが不足しています</div>`;
    const maxA = avgs[0].avg;
    return `<div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:4px">
      <div style="background:var(--g5);padding:8px 14px;font-size:11px;color:var(--g2);font-weight:600">${label}（${recs.length}日分の平均）</div>
      ${avgs.slice(0,8).map(d => `
      <div style="display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px">
        <div style="flex:1;font-size:13px;font-weight:600">${d.name}</div>
        <div style="min-width:120px">
          <div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;background:var(--g3);border-radius:3px;width:${Math.round(d.avg/maxA*100)}%"></div>
          </div>
        </div>
        <div style="text-align:right;min-width:80px">
          <div style="font-size:13px;font-weight:700;color:var(--g2)">平均 ${d.avg}個</div>
          <div style="font-size:10px;color:var(--text3)">最大 ${d.max}個</div>
        </div>
      </div>`).join('')}
    </div>`;
  };

  // 晴れ vs 雨比較
  const sunnyAvgs = calcItemAvg(okSunny);
  const rainyAvgs = calcItemAvg(okRainy);
  const commonItems = sunnyAvgs.filter(s => rainyAvgs.find(r=>r.name===s.name)).slice(0,5);

  return `<div class="an-wrap">
    <div style="background:var(--g5);border:1px solid var(--g4);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:4px">
      <div style="font-size:12px;color:var(--amber);font-weight:600">📌 このデータについて</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6">2025年11月〜のNotionデータ（商品別記録あり）をもとに算出しています。データが増えるほど精度が上がります。</div>
    </div>

    <div class="an-ttl">🏔 奥多摩駅前 — 商品別 平均販売数</div>
    ${renderItemTable(okAvgs, ok, '全天気・全日')}

    ${commonItems.length>=2 ? `<div class="an-ttl">☀️🌧 天気による販売数の違い（奥多摩）</div>
    <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--bg)">
          <th style="padding:9px 12px;text-align:left;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">商品</th>
          <th style="padding:9px 12px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">☀️ 晴れ<br><span style="font-weight:400">(${okSunny.length}日)</span></th>
          <th style="padding:9px 12px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">🌧 雨<br><span style="font-weight:400">(${okRainy.length}日)</span></th>
          <th style="padding:9px 12px;text-align:center;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)">差</th>
        </tr></thead>
        <tbody>
          ${commonItems.map(s => {
            const r = rainyAvgs.find(x=>x.name===s.name);
            const diff = s.avg - (r?.avg||0);
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:9px 12px;font-weight:500">${s.name}</td>
              <td style="padding:9px 12px;text-align:center;font-weight:700;color:var(--g2)">${s.avg}個</td>
              <td style="padding:9px 12px;text-align:center;font-weight:700;color:#6B7280">${r?.avg||'-'}個</td>
              <td style="padding:9px 12px;text-align:center;font-weight:700;color:${diff>0?'var(--g2)':'#DC2626'}">${diff>0?'+':''}${diff.toFixed(1)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}

    ${evAvgs.length>0 ? `<div class="an-ttl">🎪 イベント — 商品別 平均販売数</div>
    ${renderItemTable(evAvgs, ev, 'イベント全体')}` : ''}

    ${(() => {
      const largeEv = withItems.filter(r => r.loc==='イベント' && r.total >= 100000);
      const normalEv = withItems.filter(r => r.loc==='イベント' && r.total < 100000);
      const largeAvgs = calcItemAvg(largeEv);
      const normalAvgs = calcItemAvg(normalEv);
      if(!largeAvgs.length && !normalAvgs.length) return '';
      return `<div class="an-ttl">🎪 イベント規模別 — 商品別 平均販売数</div>
      <div style="background:var(--g5);border:1px solid var(--g4);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:12px;color:var(--amber)">
        🔴 大規模：売上¥10万以上の日（${largeEv.length}日）　🟡 通常：¥10万未満の日（${normalEv.length}日）
      </div>
      ${largeAvgs.length>0 ? renderItemTable(largeAvgs, largeEv, '🔴 大規模イベント（¥10万以上/日）') : ''}
      ${normalAvgs.length>0 ? renderItemTable(normalAvgs, normalEv, '🟡 通常イベント（¥10万未満/日）') : ''}`;
    })()}

    <div style="height:20px"></div>
  </div>`;
}

function renderCompare(){
  const c = document.getElementById('content'); if(!c||view!=='compare') return;
  const active = records.filter(r => r.total > 0);
  const modes = ['商品ランキング','イベント年比較','奥多摩 期間別'];
  c.innerHTML = `
  <div class="cmp-tabs">
    ${modes.map(m => `<button class="cmp-tab${cmpMode===m?' on':''}" onclick="setCmpMode('${m}')">${m}</button>`).join('')}
  </div>
  ${cmpMode==='商品ランキング' ? renderProdCmp(active) : cmpMode==='イベント年比較' ? renderEvCmp(active) : renderOkCmp(active)}
  <div style="height:20px"></div>`;
}

function renderProdCmp(active){
  return ['フード','ドリンク','物販'].map(cat => {
    const catIds = new Set(PRODS[cat].map(p => p.id));
    const ptot = {};
    active.forEach(r => {
      Object.entries(r.items||{}).forEach(([id,val]) => {
        if(!catIds.has(id)) return;
        const qty = typeof val==='object'?val.qty:val; if(!qty) return;
        const p = ALL.find(x=>x.id===id); if(!p) return;
        if(!ptot[id]) ptot[id] = {name:p.name, qty:0, days:0};
        ptot[id].qty += qty; ptot[id].days++;
      });
    });
    const tops = Object.values(ptot).sort((a,b)=>b.qty-a.qty);
    if(!tops.length) return '';
    const maxQ = tops[0].qty || 1;
    const ico = cat==='フード'?'🍱':cat==='ドリンク'?'☕':'🛍';
    return `<div class="yr-card">
      <div class="yr-card-hdr"><div class="yr-card-name">${ico} ${cat} ランキング</div></div>
      <div style="padding:2px 14px">
        ${tops.map((p,i) => `<div class="rank-row">
          <div class="rank-n">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${p.name}</div>
            <div class="rank-bar-bg"><div class="rank-bar" style="width:${Math.round(p.qty/maxQ*100)}%"></div></div>
          </div>
          <div class="rank-right"><div class="rank-qty">${p.qty}個</div><div class="rank-days">${p.days}日</div></div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderEvCmp(active){
  const grouped = {};
  active.filter(r=>r.loc==='イベント'&&r.event).forEach(r => {
    if(!grouped[r.event]) grouped[r.event] = [];
    grouped[r.event].push(r);
  });
  const sorted = Object.keys(grouped).sort((a,b) => {
    const ya = [...new Set(grouped[a].map(r=>r.date.substring(0,4)))];
    const yb = [...new Set(grouped[b].map(r=>r.date.substring(0,4)))];
    return yb.length - ya.length || grouped[b].reduce((s,r)=>s+r.total,0) - grouped[a].reduce((s,r)=>s+r.total,0);
  });
  return `<div style="padding:8px 12px 0;font-size:12px;color:var(--text3)">複数年あるイベントを上位表示</div>
  ${sorted.map(ev => {
    const recs = grouped[ev].sort((a,b)=>a.date.localeCompare(b.date));
    const byYear = {};
    recs.forEach(r => {
      const y = r.date.substring(0,4);
      if(!byYear[y]) byYear[y] = {total:0, days:[]};
      byYear[y].total += r.total; byYear[y].days.push(r);
    });
    const ye = Object.entries(byYear).sort(([a],[b])=>a.localeCompare(b));
    const multi = ye.length > 1;
    const diff = multi ? ye[ye.length-1][1].total - ye[0][1].total : 0;
    return `<div class="yr-card">
      <div class="yr-card-hdr">
        <div class="yr-card-name">${ev}</div>
        <div class="yr-card-sub">${ye.length}年のデータ · 計${recs.length}日</div>
      </div>
      <table class="yr-tbl">
        <thead><tr><th>年</th><th>日程</th><th>天気</th><th>売上</th></tr></thead>
        <tbody>
          ${ye.map(([y,d]) => `<tr>
            <td style="font-weight:700;color:var(--g1)">${y}</td>
            <td style="font-size:11px">${d.days.map(r=>r.date.substring(5)).join(', ')}</td>
            <td>${[...new Set(d.days.map(r=>r.weather).filter(w=>w))].map(w=>getWI(w)).join('')||'—'}</td>
            <td class="tc">${fmt(d.total)}</td>
          </tr>`).join('')}
          ${multi ? `<tr style="background:var(--bg)">
            <td colspan="3" style="font-size:11px;color:var(--text3)">前年比</td>
            <td class="tc" style="color:${diff>=0?'var(--g1)':'#DC2626'}">${diff>=0?'▲':'▼'} ${fmt(Math.abs(diff))}</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }).join('')}`;
}

function renderOkCmp(active){
  const ok = active.filter(r => r.loc==='奥多摩駅前');
  const years = [...new Set(ok.map(r=>r.date.substring(0,4)))].sort();
  const periods = ['GW','シルバーWK','お盆','通常'];
  const bpy = {}; periods.forEach(p => { bpy[p]={}; years.forEach(y => { bpy[p][y]={total:0,count:0,recs:[]}; }); });
  ok.forEach(r => {
    const p = getPeriod(r.date), y = r.date.substring(0,4);
    if(bpy[p]&&bpy[p][y]){ bpy[p][y].total+=r.total; bpy[p][y].count++; bpy[p][y].recs.push(r); }
  });
  const byMY = {};
  ok.forEach(r => {
    const m = r.date.substring(5,7), y = r.date.substring(0,4);
    if(!byMY[m]) byMY[m] = {}; if(!byMY[m][y]) byMY[m][y]={total:0,count:0};
    byMY[m][y].total+=r.total; byMY[m][y].count++;
  });
  const pL = {'GW':'🌸 GW','シルバーWK':'🍂 シルバーWK','お盆':'🏖 お盆','通常':'📅 通常日'};
  return periods.filter(p=>Object.values(bpy[p]).some(d=>d.count>0)).map(p => {
    const data = bpy[p];
    return `<div class="yr-card">
      <div class="yr-card-hdr"><div class="yr-card-name">${pL[p]}</div></div>
      <table class="yr-tbl">
        <thead><tr><th>年</th><th>日数</th><th>合計</th><th>日平均</th></tr></thead>
        <tbody>
          ${years.filter(y=>data[y].count>0).map(y => `<tr>
            <td style="font-weight:700;color:var(--g1)">${y}</td>
            <td>${data[y].count}日</td>
            <td class="tc">${fmt(data[y].total)}</td>
            <td style="font-size:11px;color:var(--text3)">${fmt(Math.round(data[y].total/data[y].count))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px">
        ${Object.values(data).flatMap(d=>d.recs).sort((a,b)=>b.date.localeCompare(a.date)).map(r =>
          `<span style="font-size:11px;padding:3px 8px;background:var(--bg);border-radius:20px;color:var(--text2)">${fmtD(r.date)} ${getWI(r.weather)} ${fmt(r.total)}</span>`
        ).join('')}
      </div>
    </div>`;
  }).join('') +
  `<div style="margin:0 12px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
    <div style="background:var(--g5);padding:10px 14px;font-size:13px;font-weight:700;color:var(--g1)">月別 年比較</div>
    <table class="yr-tbl" style="table-layout:fixed;width:100%">
      <thead><tr><th>月</th>${years.map(y=>`<th>${y}</th>`).join('')}</tr></thead>
      <tbody>
        ${Object.entries(byMY).sort(([a],[b])=>a.localeCompare(b)).map(([m,yd]) =>
          `<tr><td>${parseInt(m)}月</td>${years.map(y=>yd[y]?`<td class="tc" style="font-size:12px">${fmt(yd[y].total)}</td>`:`<td style="color:var(--text3)">—</td>`).join('')}</tr>`
        ).join('')}
      </tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════
//  Notion CSV 取り込み機能
// ══════════════════════════════════════════
const NAME_MAP = {
  'わさび丼':'wasabi_don','ミニわさび丼':'mini_don',
  'わさびポーク丼':'pork_don','わさポーク丼':'pork_don',
  'わさびいなり':'inari','わさびおにぎり':'onigiri',
  'わさびソーセージドッグ':'sausage_dog','ソーセージドッグ':'sausage_dog',
  'わさびソーセージ':'sausage','おつまみロース':'roast',
  'わさびコーヒー':'wasabi_coffee',
  'オリジナルブレンド':'orig_blend','コーヒー(オリジナルブレンド)':'orig_blend',
  'コーヒー(Decaf)':'decaf','Decaf(Coffee Supreme)':'decaf',
  'コーヒー(パッセージ)':'passage','Passage Coffee':'passage',
  'わさびピーチソーダ':'peach_soda','ゆず茶':'yuzu',
  'ドリップバッグ×1':'drip1','コーヒードリップバッグ×3':'drip3','ドリップバッグ×3':'drip3',
  '生わさび':'fresh_wasabi',
  'わさびクッキー（小）':'cookie_s','わさびクッキー(小)':'cookie_s',
  'わさびクッキー（大）':'cookie_l','わさびクッキー(大)':'cookie_l',
  'スノーボール':'snowball','わさびワッペン':'wappen','ワッペン':'wappen',
  'フェイスマスク':'mask','わさぴー':'wasabee','手さげ袋':'bag',
};

let importState = {
  dailyText: null, dailyName: null,
  itemsText: null, itemsName: null,
  preview: [], step: 'upload'
};

// CSV パーサー
function parseCSVLine(line){
  const res=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){res.push(cur.trim());cur='';}
    else{cur+=line[i];}
  }
  res.push(cur.trim()); return res;
}
function parseCSV(text){
  text = text.replace(/^\uFEFF/,'');
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(l=>{
    const vals = parseCSVLine(l);
    const obj={};
    headers.forEach((h,i)=>{ obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

// 日付文字列を YYYY-MM-DD に正規化
function normalizeDate(s){
  if(!s) return null;
  // YYYY-MM-DD から始まる形式
  const m1 = s.match(/^(\d{4}-\d{2}-\d{2})/);
  if(m1) return m1[1];
  // YYYY年M月D日
  const m2 = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(m2) return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  return null;
}

// 売上金額の文字列を数値に
function parseAmount(s){
  if(!s) return 0;
  return parseInt(s.replace(/[￥¥,\s]/g,'')) || 0;
}

// 取込データを構築
function buildImportRecords(){
  const dailyRows = importState.dailyText ? parseCSV(importState.dailyText) : [];
  const itemRows  = importState.itemsText ? parseCSV(importState.itemsText)  : [];

  // 営業日別: 日付→{total, memo}
  const dailyMap = {};
  dailyRows.forEach(r=>{
    // 複数カラム名に対応
    const dateRaw = r['営業日'] || r['日付'] || '';
    const date = normalizeDate(dateRaw);
    if(!date) return;
    const totalRaw = r['売上合計'] || r['売上'] || '';
    const total = parseAmount(totalRaw);
    if(total <= 0) return;
    // テンプレート行を除外
    if(dateRaw.includes('テンプレート') || r['備考']?.includes('テンプレート')) return;
    const memo = (r['備考'] || r['メモ'] || '').trim();
    dailyMap[date] = {total, memo};
  });

  // 販売記録: 日付→{productId: qty}
  const itemsMap = {};
  itemRows.forEach(r=>{
    const dateRaw = r['営業日'] || r['日付'] || '';
    const date = normalizeDate(dateRaw);
    if(!date) return;
    const productName = (r['商品名'] || '').trim();
    const pid = NAME_MAP[productName];
    if(!pid) return;
    const qty = parseInt(r['販売数']) || 0;
    if(qty <= 0) return;
    if(!itemsMap[date]) itemsMap[date] = {};
    itemsMap[date][pid] = (itemsMap[date][pid] || 0) + qty;
  });

  // マージ: dailyMapをベースに itemsMapで商品を付与
  const allDates = new Set([...Object.keys(dailyMap), ...Object.keys(itemsMap)]);
  const existing = new Set(records.map(r=> r.date + '_' + (r.event||'')));

  const preview = [];
  allDates.forEach(date=>{
    const daily = dailyMap[date];
    const items = itemsMap[date] || {};
    if(!daily && Object.keys(items).length===0) return;

    const memo  = daily?.memo || '';
    const total = daily?.total || 0;
    const loc   = (memo && memo.trim()) ? 'イベント' : '奥多摩駅前';
    const event = loc==='イベント' ? memo.trim() : '';

    // カテゴリ別合計を計算
    let food=0,drink=0,merch=0;
    Object.entries(items).forEach(([pid,qty])=>{
      const p = ALL.find(x=>x.id===pid); if(!p||!p.price) return;
      const sub = p.price * qty;
      if(FOOD_IDS.has(pid)) food+=sub;
      else if(DRINK_IDS.has(pid)) drink+=sub;
      else merch+=sub;
    });

    // 商品データをapp形式に変換
    const itemsObj = {};
    Object.entries(items).forEach(([pid,qty])=>{ itemsObj[pid]={qty}; });

    const key = date + '_' + event;
    const isDup = existing.has(key);
    const id = 'csv_' + date.replace(/-/g,'') + (event ? '_'+event.substring(0,4) : '');

    preview.push({
      id, date, loc, event, weather:'',
      items: itemsObj,
      foodTotal: food, drinkTotal: drink, merchTotal: merch,
      total: total || (food+drink+merch),
      memo: '', source:'notion',
      _isDup: isDup
    });
  });

  return preview.sort((a,b)=>a.date.localeCompare(b.date));
}

// ファイル読み込み
function handleFileDrop(e, type){
  e.preventDefault();
  const file = e.dataTransfer?.files[0] || e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    if(type==='daily'){
      importState.dailyText = ev.target.result;
      importState.dailyName = file.name;
    } else {
      importState.itemsText = ev.target.result;
      importState.itemsName = file.name;
    }
    importState.step = 'upload';
    renderImport();
  };
  reader.readAsText(file, 'UTF-8');
}

function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }

function doParseImport(){
  importState.preview = buildImportRecords();
  importState.step = 'preview';
  renderImport();
}

async function confirmImport(){
  const newRecs = importState.preview.filter(r => !r._isDup);
  if(newRecs.length === 0){ showToast('新しいデータがありません'); return; }

  // _isDup フラグを除去して追加
  const clean = newRecs.map(r=>{ const {_isDup,...rest}=r; return rest; });
  records = [...records, ...clean].sort((a,b)=>a.date.localeCompare(b.date));
  saveToStorage();
  showToast(`✅ ${clean.length}件を取り込みました`);

  // スプレッドシートにも同期
  syncToSheets(clean);

  // リセット
  importState = { dailyText:null, dailyName:null, itemsText:null, itemsName:null, preview:[], step:'done' };
  renderImport();
}

function resetImport(){
  importState = { dailyText:null, dailyName:null, itemsText:null, itemsName:null, preview:[], step:'upload' };
  renderImport();
}

      <div class="drop-zone-sub">${dailyName ? '✓ 読み込み済み（タップで変更）' : '営業日別販売記録_〇〇〇.csv'}</div>
    </div>

    <!-- 販売記録CSV -->
    <div style="margin-bottom:6px;font-size:11px;font-weight:600;color:var(--text3)">② 販売記録（商品別内訳）</div>
    <div class="drop-zone ${itemsName?'loaded':''}" id="drop-items"

      <input type="file" id="file-items" accept=".csv" style="display:none" onchange="handleFileDrop(event,'items')">
      <div class="drop-zone-icon">${itemsName ? '📗' : '📄'}</div>
      <div class="drop-zone-title">${itemsName || 'ここにドロップ または タップして選択'}</div>
      <div class="drop-zone-sub">${itemsName ? '✓ 読み込み済み（タップで変更）' : '販売記録_〇〇〇.csv'}</div>
    </div>

    <button class="import-parse-btn" onclick="doParseImport()" ${canParse?'':'disabled'}>
      解析してプレビューを表示
    </button>
  </div>

  ${step==='preview' && preview.length > 0 ? `
  <div class="card" style="margin-top:0">
    <div class="card-lbl">プレビュー</div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <div style="flex:1;background:var(--g5);border-radius:var(--radius);padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--g1)">${newCount}</div>
        <div style="font-size:11px;color:var(--g2)">新規取込</div>
      </div>
      <div style="flex:1;background:var(--bg);border-radius:var(--radius);padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--text3)">${dupCount}</div>
        <div style="font-size:11px;color:var(--text3)">重複（スキップ）</div>
      </div>
    </div>
    <div style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)">
      ${preview.map(r => `
      <div class="preview-row ${r._isDup?'dup-rec':'new-rec'}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${fmtD(r.date)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">
            ${r.loc==='イベント'?'🎪 '+r.event:'🏔 奥多摩駅前'}
          </div>
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--g1);margin-right:8px">${fmt(r.total)}</div>
        <span class="preview-badge ${r._isDup?'badge-dup':'badge-new'}">${r._isDup?'重複':'新規'}</span>

  ${newCount > 0 ? `<button class="import-confirm-btn" onclick="confirmImport()">

      <div style="font-size:13px">データが見つかりませんでした。<br>ファイルを確認してください。</div>

  <div style="height:16px"></div>`;
}
